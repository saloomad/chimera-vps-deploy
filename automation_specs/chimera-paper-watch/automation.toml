prompt = "Run the Deezoh paper-desk watch and action loop on OpenClaw in a new chat. This automation is user-facing. Do not make Sal open files just to understand what happened.\n\nStart with a deterministic monitor pass: verify active-trade truth, same-cycle freshness, hard blockers, the canonical tuple (`core_condition`, `situation_pack`, `desk_state`, `timeframe_owner`, `wait_state`), the current focus symbol and direction, and receiving-path health. Only then run condition-driven judgment. Compare best long, best short, and best no-trade across macro, catalyst, screener, chart, indicator, derivatives, strategy, challenger, entry, execution, and risk lanes. Require expert council for mixed, event-heavy, countertrend, or why-this-not-that cases.\n\nBefore reporting, safely fix anything routine and non-destructive: refresh stale maintained producers, rerun the current chart and indicator lane for the active focus when needed, rebuild desk, council, orchestrator, and operator artifacts, and clear stale routed issues when the latest cycle is healthy. If something is not safely fixable in-cycle, route it to the correct owner through `INTER_AGENT_INBOX.json` and `agents/deezoh/PENDING_QUESTIONS.json` with a clear owner, blocker code, and evidence. If the blocker is structural, recurring, orchestration-related, or contract-shape related, route it to `architect` on OpenClaw and also update the project-management surfaces so the issue is tracked beyond this run. For local Codex follow-through, make sure the result is visible to the critical-work executor path by updating the relevant task, action, or continuity surfaces when the issue is real.\n\nDo not hand-write the operator files when the deterministic builder exists. Rebuild the operator visibility surface by running `python3 /home/open-claw/openclawtrading/scripts/build_paper_desk_operator_report.py` after refresh and resync work so these files stay current: `/home/open-claw/openclawtrading/reports/auto/PAPER_DESK_PIPELINE_BRIEF.md`, `/home/open-claw/openclawtrading/reports/auto/PAPER_DESK_INTERACTION_TRACE.md`, and `/home/open-claw/openclawtrading/reports/auto/PAPER_DESK_OPERATOR_SNAPSHOT.json`.\n\nIf the latest blocker is critical and the automation cannot safely fix it in-cycle, also write or update `/home/open-claw/openclawtrading/reports/auto/PAPER_DESK_HUMAN_ESCALATION.md`. That escalation note must say in plain English: the exact problem, why the AI stopped, what a human needs to decide or do, the safest recommendations, the exact evidence files/scripts, and who owns the next action. When you create or refresh that escalation note, also update the local project-management surfaces so the issue is not stranded in one report.\n\nUse the snapshot, brief, and trace files as the final source of truth for the message. Distinguish actual specialist execution, report-backed answers, out-of-cycle reports, and synthetic questions. Say plainly if TradingView MCP, chart-analyzer, market-maker, YouTube, growth context, or parent context were not actually used in the current cycle. Name the exact files and scripts used when writing the markdown reports. Explain why the pipeline moved, stayed waiting, or got stuck. Do not keep stale routed issues alive when the current cycle is healthy.\n\nWrite the result as a human-readable operator update, not an XML wrapper. The chat message itself must contain the important contents from the reports. Use this exact shape:\n1. `What You Need To Know Now` with 8-12 flat bullets. Include: desk state, current focus, watchlist, what changed this cycle, whether the pipeline moved or is stuck, top blocker, what actually ran, what did not actually run, what was auto-fixed, and who owns the next action.\n2. `Deezoh And Lane Interactions This Cycle` with flat bullets for the important lanes. Each bullet must say: what Deezoh asked, what the lane answered, response quality, whether it was verified current-cycle execution or only report-backed, and whether the lane seems to be following its instructions well enough.\n3. `Agent Recommendations` with short plain-English recommendations from the important lanes, plus what the desk is waiting for.\n4. `Issues Fixed Automatically` with only the safe fixes that actually happened in this run.\n5. `Issues Still Open And Routing` with what is still broken, whether continuation is already routed, whether a human escalation note was created, and who is responsible.\n6. `Links For Drill-Down` only at the end, as optional proof paths.\n\nDo not answer with only 'files updated' or 'see the brief'. Quote the important contents directly in the message so Sal can understand the cycle without opening anything."
